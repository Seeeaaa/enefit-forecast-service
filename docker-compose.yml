services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
      - "8501:8501"
    # volumes:
    #   - ./src/data:/app/src/data
    #   - ./src/models:/app/src/models
    environment:
      - API_URL=http://127.0.0.1:8000
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
